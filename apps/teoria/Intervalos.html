<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Examen de Intervalos Musicales - R.Raíndo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f1117;
            --bg-card: #181b24;
            --bg-card-hover: #1e2230;
            --bg-input: #141720;
            --accent: #c9a84c;
            --accent-dim: rgba(201,168,76,0.15);
            --accent-glow: rgba(201,168,76,0.35);
            --text-primary: #ecedf0;
            --text-secondary: #7a7f8e;
            --text-muted: #4f5462;
            --green: #5eead4;
            --green-dim: rgba(94,234,212,0.12);
            --red: #fb7185;
            --red-dim: rgba(251,113,133,0.12);
            --blue: #60a5fa;
            --blue-dim: rgba(96,165,250,0.12);
            --radius: 14px;
            --radius-sm: 10px;
            --radius-lg: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 8px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            overflow-x: hidden;
            color: var(--text-primary);
            position: relative;
        }

        /* ambient glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 20% 100%, rgba(94,234,212,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Overlay & popups (z-index stack) ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 999;
            display: none;
        }
        .overlay.active { display: block; }

        .result-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            text-align: center;
            padding: 24px 36px;
            border-radius: var(--radius-lg);
            font-size: 22px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            display: none;
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
            animation: popIn 0.3s cubic-bezier(0.22,1,0.36,1);
            border: 1px solid rgba(255,255,255,0.08);
        }

        @keyframes popIn {
            0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
        }

        .result-indicator.correct {
            background: var(--green-dim);
            color: var(--green);
            border-color: rgba(94,234,212,0.25);
        }
        .result-indicator.incorrect {
            background: var(--red-dim);
            color: var(--red);
            border-color: rgba(251,113,133,0.25);
        }
        .result-indicator.incorrect span {
            color: var(--text-primary);
            font-size: 17px;
        }

        .next-btn-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1001;
            display: none;
            text-align: center;
        }

        .next-btn-overlay .btn {
            padding: 12px 36px;
            font-size: 15px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.4);
            margin-bottom: 10px;
        }

        .next-btn-info {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 12px 18px;
            border-radius: var(--radius);
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.5;
            box-shadow: 0 6px 22px rgba(0,0,0,0.35);
        }

        .next-btn-info .main-answer {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 3px;
        }
        .next-btn-info .main-answer.correct-color  { color: var(--green); }
        .next-btn-info .main-answer.incorrect-color { color: var(--red); }

        .next-btn-info .interval-details {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* ── Outer wrapper (mirrors .container in Armaduras) ── */
        .container {
            width: 100%;
            max-width: 460px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 14px;
        }

        .author {
            font-size: 0.75em;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.7em;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.3px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 0.78em;
            color: var(--text-secondary);
            margin-top: 5px;
            letter-spacing: 0.3px;
        }

        /* ── Screens ── */
        .screen         { display: none; }
        .screen.active  { display: block; }

        /* ── Labels ── */
        label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.8em;
            letter-spacing: 0.3px;
        }

        .input-group { margin-bottom: 14px; }

        /* ── Level selector ── */
        .level-selector {
            display: flex;
            gap: 6px;
        }

        .level-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg-card-hover);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
            min-height: 42px;
            letter-spacing: 0.3px;
        }
        .level-btn:hover {
            border-color: rgba(201,168,76,0.3);
            background: var(--bg-input);
        }
        .level-btn.selected {
            background: var(--accent-dim);
            border-color: rgba(201,168,76,0.4);
            color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* ── Direction selector ── */
        .direction-selector {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .direction-btn {
            padding: 11px 14px;
            background: var(--bg-card-hover);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }
        .direction-btn::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .direction-btn:hover {
            border-color: rgba(201,168,76,0.3);
            background: var(--bg-input);
        }
        .direction-btn:hover::before { opacity: 1; }
        .direction-btn:active { transform: translateY(1px); }

        .direction-btn.selected {
            background: var(--accent-dim);
            border-color: rgba(201,168,76,0.4);
            color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .direction-btn.selected::before { opacity: 1; }

        .arrow { font-size: 18px; }

        /* ── Primary action button ── */
        .btn {
            width: 100%;
            padding: 12px 32px;
            font-size: 15px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
            min-height: 44px;
            background: var(--accent-dim);
            color: var(--accent);
            letter-spacing: 0.4px;
        }
        .btn:hover {
            background: rgba(201,168,76,0.22);
            border-color: rgba(201,168,76,0.45);
            box-shadow: 0 0 16px var(--accent-glow);
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(1px);
            box-shadow: none;
        }
        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Progress label ── */
        .progress {
            text-align: center;
            color: var(--accent);
            font-size: 0.82em;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: 0.4px;
        }

        /* ── Question box ── */
        .question-box {
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 18px 14px;
            margin-bottom: 12px;
            text-align: center;
        }

        .note-fundamental {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .interval-type {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }
        .interval-type span { color: var(--text-muted); }

        .interval-description {
            font-size: 0.82em;
            color: var(--text-secondary);
        }

        /* ── Answer section ── */
        .answer-section {
            background: var(--bg-card-hover);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 10px;
        }

        .answer-label {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.78em;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        /* ── Note selector ── */
        .note-selector {
            display: flex;
            justify-content: space-around;
            gap: 4px;
            margin-bottom: 12px;
        }

        .note-btn {
            flex: 1;
            padding: 8px 2px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.18s cubic-bezier(0.22,1,0.36,1);
            min-height: 40px;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }
        .note-btn::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .note-btn:hover {
            border-color: rgba(201,168,76,0.3);
            background: var(--bg-input);
        }
        .note-btn:hover::before { opacity: 1; }
        .note-btn:active { transform: translateY(1px); }

        .note-btn.selected {
            background: var(--accent-dim);
            border-color: rgba(201,168,76,0.4);
            color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .note-btn.selected::before { opacity: 1; }

        /* ── Modifier selector ── */
        .modifier-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-bottom: 12px;
        }

        .modifier-btn {
            padding: 8px 4px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.18s cubic-bezier(0.22,1,0.36,1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-height: 38px;
            letter-spacing: 0.2px;
        }
        .modifier-btn:hover {
            border-color: rgba(96,165,250,0.3);
            background: var(--bg-input);
        }
        .modifier-btn:active { transform: translateY(1px); }

        .modifier-btn.selected {
            background: var(--blue-dim);
            border-color: rgba(96,165,250,0.4);
            color: var(--blue);
            box-shadow: 0 0 10px rgba(96,165,250,0.2);
        }

        .symbol { font-size: 15px; }

        /* ── Submit button (reuses .btn, no extra override needed) ── */
        .submit-btn {
            width: 100%;
            padding: 12px 32px;
            font-size: 15px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
            min-height: 44px;
            background: var(--accent-dim);
            color: var(--accent);
            letter-spacing: 0.4px;
        }
        .submit-btn:hover {
            background: rgba(201,168,76,0.22);
            border-color: rgba(201,168,76,0.45);
            box-shadow: 0 0 16px var(--accent-glow);
            transform: translateY(-1px);
        }
        .submit-btn:active {
            transform: translateY(1px);
            box-shadow: none;
        }
        .submit-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Inline feedback bar ── */
        .feedback {
            background: var(--bg-card-hover);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            margin-top: 10px;
            font-size: 0.85em;
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.6;
        }
        .feedback.correct {
            background: var(--green-dim);
            border-color: rgba(94,234,212,0.2);
            color: var(--green);
        }
        .feedback.incorrect {
            background: var(--red-dim);
            border-color: rgba(251,113,133,0.2);
            color: var(--red);
        }

        .feedback-correct-answer {
            font-weight: 600;
            font-size: 14px;
            color: var(--green);
            margin-top: 4px;
            display: block;
        }

        .interval-info {
            font-size: 0.82em;
            color: var(--text-muted);
            margin-top: 4px;
            font-style: italic;
        }

        /* ── Results screen ── */
        .result-box { text-align: center; padding: 24px 0; }

        .result-box .message {
            font-family: 'Playfair Display', serif;
            font-size: 1.5em;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 12px;
            letter-spacing: 0.3px;
        }

        .score {
            font-family: 'Playfair Display', serif;
            font-size: 3.2em;
            font-weight: 600;
            color: var(--accent);
            margin: 8px 0;
            letter-spacing: 0.3px;
        }

        .grade {
            font-size: 1.1em;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            h1 { font-size: 1.4em; }
            .modifier-selector { grid-template-columns: repeat(3, 1fr); }
            .note-btn { font-size: 13px; padding: 6px 1px; }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="result-indicator" id="resultIndicator"></div>
    <div class="next-btn-overlay" id="nextBtnOverlay">
        <button class="btn" style="width:auto;" onclick="nextQuestion()">Siguiente</button>
        <div class="next-btn-info" id="nextBtnInfo"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="author">R.Raíndo</div>
            <h1>🎵 Examen de Intervalos</h1>
            <div class="subtitle" id="subtitle">Nivel 1 – Ascendentes</div>
        </div>

        <!-- ── START SCREEN ── -->
        <div id="startScreen" class="screen active">
            <div class="input-group">
                <label>Selecciona el nivel:</label>
                <div class="level-selector">
                    <button class="level-btn selected" onclick="selectLevel(1)" data-level="1">Nivel 1</button>
                    <button class="level-btn"          onclick="selectLevel(2)" data-level="2">Nivel 2</button>
                </div>
            </div>
            <div class="input-group">
                <label>Selecciona el tipo de intervalos:</label>
                <div class="direction-selector">
                    <button class="direction-btn selected" onclick="selectDirection('ascending')"  data-direction="ascending">
                        <span class="arrow">↑</span> Ascendentes
                    </button>
                    <button class="direction-btn"          onclick="selectDirection('descending')" data-direction="descending">
                        <span class="arrow">↓</span> Descendentes
                    </button>
                    <button class="direction-btn"          onclick="selectDirection('mixed')"      data-direction="mixed">
                        <span class="arrow">↕</span> Combinados
                    </button>
                </div>
            </div>
            <button class="btn" onclick="startExam()">Comenzar Examen</button>
        </div>

        <!-- ── QUESTION SCREEN ── -->
        <div id="questionScreen" class="screen">
            <div class="progress" id="progress"></div>
            <div class="question-box">
                <div class="note-fundamental" id="noteFundamental"></div>
                <div class="interval-type" id="intervalType"></div>
                <div class="interval-description">¿Qué nota resulta?</div>
            </div>

            <div class="answer-section">
                <div class="answer-label">Selecciona la nota:</div>
                <div class="note-selector" id="noteSelector"></div>

                <div class="answer-label">Modificadores:</div>
                <div class="modifier-selector">
                    <button class="modifier-btn selected" onclick="selectModifier('natural')"      data-modifier="natural">
                        <span class="symbol">♮</span> Natural
                    </button>
                    <button class="modifier-btn"          onclick="selectModifier('sharp')"        data-modifier="sharp">
                        <span class="symbol">♯</span> Sostenido
                    </button>
                    <button class="modifier-btn"          onclick="selectModifier('flat')"         data-modifier="flat">
                        <span class="symbol">♭</span> Bemol
                    </button>
                    <button class="modifier-btn"          onclick="selectModifier('double-sharp')" data-modifier="double-sharp">
                        <span class="symbol">𝄪</span> Doble ♯
                    </button>
                    <button class="modifier-btn"          onclick="selectModifier('double-flat')"  data-modifier="double-flat">
                        <span class="symbol">𝄫</span> Doble ♭
                    </button>
                </div>

                <button class="submit-btn" id="submitBtn" onclick="submitAnswer()" disabled>Enviar Respuesta</button>
            </div>

            <div class="feedback" id="feedback" style="display:none;"></div>
        </div>

        <!-- ── RESULT SCREEN ── -->
        <div id="resultScreen" class="screen">
            <div class="result-box">
                <div class="message">¡Bien hecho!</div>
                <div class="score" id="finalScore"></div>
                <div class="grade" id="finalGrade"></div>
                <button class="btn" style="width:auto; margin:0 auto; display:block;" onclick="resetExam()">Repetir Examen</button>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════════
         SCRIPT – sin cambios de lógica respecto al original
         ════════════════════════════════════════════════════════════ -->
    <script>
        const TOTAL_QUESTIONS = 10;
        let currentQuestion = 0;
        let score = 0;
        let questions = [];
        let selectedNote = null;
        let selectedModifier = 'natural';
        let hasAnswered = false;
        let intervalDirection = 'ascending';
        let selectedLevel = 1;

        const notes = ['Do', 'Re', 'Mi', 'Fa', 'Sol', 'La', 'Si'];

        const intervalsLevel1 = [
            { name: 'Segunda menor',  semitones: 1,  degree: 2 },
            { name: 'Segunda Mayor',  semitones: 2,  degree: 2 },
            { name: 'Tercera Menor',  semitones: 3,  degree: 3 },
            { name: 'Tercera Mayor',  semitones: 4,  degree: 3 },
            { name: 'Cuarta Justa',   semitones: 5,  degree: 4 },
            { name: 'Quinta Justa',   semitones: 7,  degree: 5 },
            { name: 'Sexta Menor',    semitones: 8,  degree: 6 },
            { name: 'Sexta Mayor',    semitones: 9,  degree: 6 }
        ];

        const intervalsLevel2 = [
            { name: 'Segunda menor',          semitones: 1,  degree: 2 },
            { name: 'Segunda Mayor',          semitones: 2,  degree: 2 },
            { name: 'Segunda Aumentada',      semitones: 3,  degree: 2 },
            { name: 'Tercera Disminuida',     semitones: 2,  degree: 3 },
            { name: 'Tercera Menor',          semitones: 3,  degree: 3 },
            { name: 'Tercera Mayor',          semitones: 4,  degree: 3 },
            { name: 'Tercera Aumentada',      semitones: 5,  degree: 3 },
            { name: 'Cuarta Disminuida',      semitones: 4,  degree: 4 },
            { name: 'Cuarta Justa',           semitones: 5,  degree: 4 },
            { name: 'Cuarta Aumentada',       semitones: 6,  degree: 4 },
            { name: 'Quinta Disminuida',      semitones: 6,  degree: 5 },
            { name: 'Quinta Justa',           semitones: 7,  degree: 5 },
            { name: 'Quinta Aumentada',       semitones: 8,  degree: 5 },
            { name: 'Sexta Disminuida',       semitones: 7,  degree: 6 },
            { name: 'Sexta Menor',            semitones: 8,  degree: 6 },
            { name: 'Sexta Mayor',            semitones: 9,  degree: 6 },
            { name: 'Sexta Aumentada',        semitones: 10, degree: 6 },
            { name: 'Séptima Disminuida',     semitones: 9,  degree: 7 },
            { name: 'Séptima Menor',          semitones: 10, degree: 7 },
            { name: 'Séptima Mayor',          semitones: 11, degree: 7 },
            { name: 'Octava Justa',           semitones: 12, degree: 8 }
        ];

        const notesToSemitones = {
            'Do': 0, 'Re': 2, 'Mi': 4, 'Fa': 5, 'Sol': 7, 'La': 9, 'Si': 11
        };

        const modifierValues = {
            'natural': 0, 'sharp': 1, 'flat': -1, 'double-sharp': 2, 'double-flat': -2
        };

        const modifierSymbols = {
            'natural': '', 'sharp': '♯', 'flat': '♭', 'double-sharp': '𝄪', 'double-flat': '𝄫'
        };

        function selectLevel(level) {
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelector(`[data-level="${level}"]`).classList.add('selected');
            selectedLevel = level;
        }

        function selectDirection(direction) {
            document.querySelectorAll('.direction-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelector(`[data-direction="${direction}"]`).classList.add('selected');
            intervalDirection = direction;
        }

        function startExam() {
            const subtitle = document.getElementById('subtitle');
            const levelText = selectedLevel === 1 ? 'Nivel 1' : 'Nivel 2 (Avanzado)';

            if (intervalDirection === 'ascending')  subtitle.textContent = `${levelText} – Ascendentes`;
            else if (intervalDirection === 'descending') subtitle.textContent = `${levelText} – Descendentes`;
            else subtitle.textContent = `${levelText} – Combinados`;

            generateQuestions();
            showScreen('questionScreen');
            displayQuestion();
        }

        function calculateInterval(fundamentalNote, interval, direction) {
            const fundamentalIndex = notes.indexOf(fundamentalNote);
            const fundamentalSemitone = notesToSemitones[fundamentalNote];

            let targetNoteIndex;
            if (direction === 'ascending') targetNoteIndex = (fundamentalIndex + interval.degree - 1) % 7;
            else                           targetNoteIndex = (fundamentalIndex - interval.degree + 1 + 7) % 7;

            const targetNoteName          = notes[targetNoteIndex];
            const targetNoteNaturalSemitone = notesToSemitones[targetNoteName];

            let targetSemitone;
            if (direction === 'ascending') targetSemitone = (fundamentalSemitone + interval.semitones) % 12;
            else                           targetSemitone = (fundamentalSemitone - interval.semitones + 12) % 12;

            let semitoneDifference = targetSemitone - targetNoteNaturalSemitone;

            if (direction === 'ascending'  && semitoneDifference < -6)  semitoneDifference += 12;
            if (direction === 'descending' && semitoneDifference >  6)  semitoneDifference -= 12;

            let correctModifier = 'natural';
            if      (semitoneDifference ===  1) correctModifier = 'sharp';
            else if (semitoneDifference === -1) correctModifier = 'flat';
            else if (semitoneDifference ===  2) correctModifier = 'double-sharp';
            else if (semitoneDifference === -2) correctModifier = 'double-flat';

            return { noteName: targetNoteName, modifier: correctModifier, semitoneValue: targetSemitone };
        }

        function generateQuestions() {
            questions = [];
            const intervals = selectedLevel === 1 ? intervalsLevel1 : intervalsLevel2;

            for (let i = 0; i < TOTAL_QUESTIONS; i++) {
                const fundamentalNote = notes[Math.floor(Math.random() * notes.length)];
                const interval = intervals[Math.floor(Math.random() * intervals.length)];

                let questionDirection;
                if (intervalDirection === 'mixed') questionDirection = Math.random() < 0.5 ? 'ascending' : 'descending';
                else                               questionDirection = intervalDirection;

                const result = calculateInterval(fundamentalNote, interval, questionDirection);

                questions.push({
                    fundamental:     fundamentalNote,
                    interval:        interval.name,
                    correctNote:     result.noteName,
                    correctModifier: result.modifier,
                    correctSemitone: result.semitoneValue,
                    semitones:       interval.semitones,
                    direction:       questionDirection
                });
            }
        }

        function displayQuestion() {
            const q = questions[currentQuestion];
            const directionSymbol = q.direction === 'ascending' ? '↑' : '↓';
            const directionText   = q.direction === 'ascending' ? 'Ascendente' : 'Descendente';

            document.getElementById('progress').textContent = `Pregunta ${currentQuestion + 1} de ${TOTAL_QUESTIONS}`;
            document.getElementById('noteFundamental').textContent = q.fundamental;
            document.getElementById('intervalType').innerHTML =
                `${directionSymbol} ${q.interval} <span>(${directionText})</span>`;

            const noteSelector = document.getElementById('noteSelector');
            noteSelector.innerHTML = '';
            notes.forEach(note => {
                const btn = document.createElement('button');
                btn.className = 'note-btn';
                btn.textContent = note;
                btn.onclick = () => selectNote(note, btn);
                noteSelector.appendChild(btn);
            });

            document.querySelectorAll('.modifier-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelector('[data-modifier="natural"]').classList.add('selected');

            document.getElementById('overlay').classList.remove('active');
            document.getElementById('resultIndicator').style.display = 'none';
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('nextBtnOverlay').style.display = 'none';
            document.getElementById('submitBtn').disabled = true;
            selectedNote     = null;
            selectedModifier = 'natural';
            hasAnswered      = false;
        }

        function selectNote(note, btn) {
            if (hasAnswered) return;
            document.querySelectorAll('.note-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedNote = note;
            document.getElementById('submitBtn').disabled = false;
        }

        function selectModifier(modifier) {
            if (hasAnswered) return;
            document.querySelectorAll('.modifier-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector(`[data-modifier="${modifier}"]`).classList.add('selected');
            selectedModifier = modifier;
        }

        function playIntervalSound(note1, note2, direction, modifier = 'natural') {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;

                const audioContext = new AudioContext();
                if (audioContext.state === 'suspended') audioContext.resume();

                const noteFrequencies = {
                    'Do': 261.63, 'Re': 293.66, 'Mi': 329.63,
                    'Fa': 349.23, 'Sol': 392.00, 'La': 440.00, 'Si': 493.88
                };

                let freq1 = noteFrequencies[note1] || 261.63;
                let freq2 = noteFrequencies[note2] || 261.63;

                const modifierAdjustment = {
                    'natural': 1,
                    'sharp':        Math.pow(2,  1/12),
                    'flat':         Math.pow(2, -1/12),
                    'double-sharp': Math.pow(2,  2/12),
                    'double-flat':  Math.pow(2, -2/12)
                };
                freq2 = freq2 * (modifierAdjustment[modifier] || 1);

                if (direction === 'ascending')  { while (freq2 < freq1) freq2 *= 2; }
                else                            { while (freq2 > freq1) freq2 /= 2; }

                playNote(audioContext, freq1, 0,    0.5);
                playNote(audioContext, freq2, 0.55, 0.5);

                setTimeout(() => { try { audioContext.close(); } catch(e){} }, 1500);
            } catch(e) { console.log('Audio no disponible:', e); }
        }

        function playNote(audioContext, frequency, startDelay, duration) {
            try {
                const currentTime = audioContext.currentTime;
                const startTime   = currentTime + startDelay;
                const endTime     = startTime + duration;

                const oscillator = audioContext.createOscillator();
                const gainNode   = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(frequency, startTime);

                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.3,  startTime + 0.02);
                gainNode.gain.linearRampToValueAtTime(0.25, startTime + 0.1);
                gainNode.gain.setValueAtTime(0.25, endTime - 0.1);
                gainNode.gain.linearRampToValueAtTime(0, endTime);

                oscillator.start(startTime);
                oscillator.stop(endTime);

                oscillator.onended = () => {
                    try { oscillator.disconnect(); gainNode.disconnect(); } catch(e){}
                };
            } catch(e) { console.log('Error reproduciendo nota:', e); }
        }

        function submitAnswer() {
            if (!selectedNote || hasAnswered) return;
            hasAnswered = true;

            const q = questions[currentQuestion];
            const isCorrect = (selectedNote === q.correctNote && selectedModifier === q.correctModifier);

            const overlay        = document.getElementById('overlay');
            const resultIndicator = document.getElementById('resultIndicator');

            overlay.classList.add('active');
            resultIndicator.style.display = 'block';

            const directionSymbol  = q.direction === 'ascending' ? '↑' : '↓';
            const operationSymbol  = q.direction === 'ascending' ? '+' : '−';

            if (isCorrect) {
                score++;
                playIntervalSound(q.fundamental, q.correctNote, q.direction, q.correctModifier);
                resultIndicator.textContent = '✓ ¡CORRECTO!';
                resultIndicator.className   = 'result-indicator correct';
                showFeedback(true,
                    `${q.fundamental} ${operationSymbol} ${q.interval} ${directionSymbol} = ${selectedNote}${modifierSymbols[selectedModifier]}\n${q.semitones} semitonos`);
            } else {
                playIntervalSound(q.fundamental, q.correctNote, q.direction, q.correctModifier);
                resultIndicator.innerHTML =
                    `✗ INCORRECTO<br><span>Respuesta correcta: ${q.correctNote}${modifierSymbols[q.correctModifier]}</span>`;
                resultIndicator.className = 'result-indicator incorrect';
                showFeedback(false,
                    `Tu respuesta: ${selectedNote}${modifierSymbols[selectedModifier]}\nRespuesta correcta: ${q.correctNote}${modifierSymbols[q.correctModifier]}\n${q.semitones} semitonos`);
            }

            setTimeout(() => {
                overlay.classList.remove('active');
                resultIndicator.style.display = 'none';
                document.getElementById('submitBtn').disabled = true;

                const nextBtnInfo = document.getElementById('nextBtnInfo');

                if (isCorrect) {
                    nextBtnInfo.innerHTML = `
                        <div class="main-answer">${q.fundamental} ${operationSymbol} ${q.interval} ${directionSymbol} = ${selectedNote}${modifierSymbols[selectedModifier]}</div>
                        <div class="interval-details">${q.semitones} semitonos</div>`;
                } else {
                    nextBtnInfo.innerHTML = `
                        <div class="main-answer incorrect-color">Tu respuesta: ${selectedNote}${modifierSymbols[selectedModifier]}</div>
                        <div class="main-answer correct-color">Respuesta correcta: ${q.correctNote}${modifierSymbols[q.correctModifier]}</div>
                        <div class="interval-details">${q.semitones} semitonos</div>`;
                }

                document.getElementById('nextBtnOverlay').style.display = 'block';
            }, 2000);
        }

        function showFeedback(isCorrect, message) {
            const feedback = document.getElementById('feedback');
            const lines = message.split('\n');

            if (isCorrect) {
                feedback.innerHTML = `${lines[0]}<div class="interval-info">${lines[1]}</div>`;
            } else {
                feedback.innerHTML = `
                    <div style="font-size:11px;">${lines[0]}</div>
                    <div class="feedback-correct-answer">✓ ${lines[1]}</div>
                    <div class="interval-info">${lines[2]}</div>`;
            }

            feedback.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');
            feedback.style.display = 'block';
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < TOTAL_QUESTIONS) displayQuestion();
            else                                   showResults();
        }

        function showResults() {
            document.getElementById('finalScore').textContent = `${score}/10`;

            let grade = '';
            if      (score <= 2) grade = 'Muy deficiente';
            else if (score <= 4) grade = 'Insuficiente';
            else if (score <= 6) grade = 'Suficiente';
            else if (score <= 8) grade = 'Notable';
            else                 grade = 'Sobresaliente';

            document.getElementById('finalGrade').textContent = grade;
            showScreen('resultScreen');
        }

        function resetExam() {
            currentQuestion   = 0;
            score             = 0;
            questions         = [];
            selectedNote      = null;
            selectedModifier  = 'natural';
            hasAnswered       = false;
            intervalDirection = 'ascending';
            selectedLevel     = 1;
            showScreen('startScreen');
            document.getElementById('subtitle').textContent = 'Nivel 1 – Ascendentes';

            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelector('[data-level="1"]').classList.add('selected');

            document.querySelectorAll('.direction-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelector('[data-direction="ascending"]').classList.add('selected');
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
