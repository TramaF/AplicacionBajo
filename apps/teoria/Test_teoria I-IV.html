            --green: #5eead4;

            --red: #fb7185;
            --radius: 14px;
            --radius-sm: 10px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            background: var(--bg-deep);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:

            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
            font-weight: 700;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--accent);
        }

        .pantalla {
            display: none;
        }

        .pantalla.activa {
            display: block;
        }

        .nivel-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: var(--radius-sm);
            font-size: 18px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nivel-btn:hover {
            background: rgba(201,168,76,0.22);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .progreso {
            text-align: center;
            margin: 20px 0;
            font-size: 18px;
            color: var(--accent);
            font-weight: 600;
        }

        .barra {
            width: 100%;
            height: 30px;
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }

        .barra-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), #2dd4bf);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-deep);
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
        }

        .pregunta {
            font-size: 22px;
            margin: 30px 0;
            color: var(--text-primary);
            font-weight: 500;
        }

        .opcion {
            padding: 15px;
            margin: 10px 0;
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 16px;
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .opcion:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }

        .opcion.correcta {
            background: rgba(94,234,212,0.2);
            color: var(--green);
            border-color: var(--green);
        }

        .opcion.incorrecta {
            background: rgba(251,113,133,0.2);
            color: var(--red);
            border-color: var(--red);
        }

        .opcion.deshabilitada {
            pointer-events: none;
        }

        .explicacion {
            display: none;
            margin: 20px 0;
            padding: 15px;
            background: var(--accent-dim);
            border-left: 4px solid var(--accent);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
        }

        .explicacion.mostrar {
            display: block;
        }

        .btn {
            display: none;
            padding: 15px 30px;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            margin: 20px auto;
            transition: all 0.3s;

        .btn.mostrar {
            display: block;
        }

        .btn:hover {
            background: rgba(201,168,76,0.22);
            box-shadow: 0 0 15px var(--accent-glow);

            text-align: center;

            font-family: 'Playfair Display', serif;
            font-size: 60px;
            color: var(--accent);
            font-weight: 700;

            border-radius: var(--radius-sm);

            margin-top: 30px;
            color: var(--text-muted);

        }

</head>

        <div id="inicio" class="pantalla activa">

            <button class="nivel-btn" onclick="iniciarTest(1)">1º Curso</button>
            <button class="nivel-btn" onclick="iniciarTest(2)">2º Curso</button>
            <button class="nivel-btn" onclick="iniciarTest(3)">3º Curso</button>
            <button class="nivel-btn" onclick="iniciarTest(4)">4º Curso</button>
        </div>

        <div id="test" class="pantalla">
            <div class="progreso">
                Pregunta <span id="numPregunta">1</span> de <span id="totalPreguntas">10</span>
            </div>
            <div class="barra">

            </div>
            <div id="pregunta" class="pregunta"></div>
            <div id="opciones"></div>
            <div id="explicacion" class="explicacion"></div>

        </div>

            <div class="resultado">
                <h2>🎉 ¡Test Completado!</h2>
                <div id="nota" class="nota"></div>
                <div id="mensaje" class="mensaje"></div>
                <div class="estadisticas">
                    <div id="stats"></div>
                </div>
                <button class="btn mostrar" onclick="volverInicio()">← Volver al Inicio</button>
                <button class="btn mostrar" onclick="repetirTest()">🔄 Repetir Test</button>
            </div>
        </div>

        <div class="footer">by R. Raíndo</div>
    </div>

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Función para reproducir sonido de acierto
        function reproducirAcierto() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // Do
            oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // Mi
            oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // Sol
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.4);
        }

        // Función para reproducir sonido de error

            const oscillator = audioContext.createOscillator();

            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(150, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function iniciarTest(nivel) {
            nivelActual = nivel;
            preguntaActual = 0;
            respuestas = [];
            
            const todas = [...preguntas[nivel]];
            preguntasTest = todas.sort(() => Math.random() - 0.5).slice(0, 10);
            
            document.getElementById('inicio').classList.remove('activa');
            document.getElementById('test').classList.add('activa');
            document.getElementById('totalPreguntas').textContent = preguntasTest.length;
            
            mostrarPregunta();
        }

        function mostrarPregunta() {
            const p = preguntasTest[preguntaActual];
            
            document.getElementById('numPregunta').textContent = preguntaActual + 1;
            const porcentaje = ((preguntaActual + 1) / preguntasTest.length) * 100;
            document.getElementById('barraFill').style.width = porcentaje + '%';
            document.getElementById('barraFill').textContent = Math.round(porcentaje) + '%';
            
            document.getElementById('pregunta').textContent = p.q;
            
            const opcionesDiv = document.getElementById('opciones');
            opcionesDiv.innerHTML = '';
            p.o.forEach((opcion, index) => {
                const div = document.createElement('div');
                div.className = 'opcion';
                div.textContent = String.fromCharCode(65 + index) + '. ' + opcion;
                div.onclick = () => seleccionar(index);
                opcionesDiv.appendChild(div);
            });
            
            document.getElementById('explicacion').classList.remove('mostrar');
            document.getElementById('btnSiguiente').classList.remove('mostrar');
        }

        function seleccionar(index) {
            const p = preguntasTest[preguntaActual];
            const opciones = document.querySelectorAll('.opcion');
            
            opciones.forEach(o => o.classList.add('deshabilitada'));
            
            opciones[p.c].classList.add('correcta');
            if (index !== p.c) {
                opciones[index].classList.add('incorrecta');
                reproducirError();
            } else {
                reproducirAcierto();
            }
            
            respuestas.push(index === p.c);
            
            document.getElementById('explicacion').textContent = p.e;
            document.getElementById('explicacion').classList.add('mostrar');
            document.getElementById('btnSiguiente').classList.add('mostrar');
        }

        function siguientePregunta() {
            preguntaActual++;
            
            if (preguntaActual < preguntasTest.length) {
                mostrarPregunta();
            } else {
                mostrarResultados();
            }
        }

        function mostrarResultados() {
            const correctas = respuestas.filter(r => r).length;
            const nota = (correctas / respuestas.length) * 10;
            
            let mensaje = '';
            if (nota >= 9) mensaje = '¡Excelente! 🌟';
            else if (nota >= 7) mensaje = '¡Muy bien! 👍';
            else if (nota >= 5) mensaje = 'Aprobado 📚';
            else mensaje = '¡Ánimo! 💪';
            
            document.getElementById('nota').textContent = nota.toFixed(1);
            document.getElementById('mensaje').textContent = mensaje;
            document.getElementById('stats').innerHTML = `
                Correctas: ${correctas} / ${respuestas.length}<br>
                Nivel: ${nivelActual}º Curso
            `;
            
            document.getElementById('test').classList.remove('activa');
            document.getElementById('resultados').classList.add('activa');
        }

        function volverInicio() {
            document.getElementById('resultados').classList.remove('activa');
            document.getElementById('inicio').classList.add('activa');
        }

        function repetirTest() {
            iniciarTest(nivelActual);
            document.getElementById('resultados').classList.remove('activa');
        }
    </script>
