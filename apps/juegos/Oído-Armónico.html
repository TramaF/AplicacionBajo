<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oído Armónico Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f1117;
            --bg-card: #181b24;
            --bg-input: #141720;
            --accent: #c9a84c;
            --accent-dim: rgba(201,168,76,0.15);
            --accent-glow: rgba(201,168,76,0.35);
            --text-primary: #ecedf0;
            --text-secondary: #7a7f8e;
            --text-muted: #4f5462;
            --green: #5eead4;
            --green-dim: rgba(94,234,212,0.12);
            --red: #f87171;
            --red-dim: rgba(248,113,113,0.12);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family:'DM Sans',sans-serif;
            background:var(--bg-deep);
            color:var(--text-primary);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:24px 16px 48px;
        }
        body::before {
            content:'';
            position:fixed;
            inset:0;
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(94,234,212,0.04) 0%, transparent 60%);
            pointer-events:none;
        }
        .wrap {
            width:100%;
            max-width:500px;
            position:relative;
            z-index:1;
            display:flex;
            flex-direction:column;
            gap:20px;
        }
        header { text-align:center; padding-bottom:4px; }
        h1 {
            font-family:'Playfair Display',serif;
            font-size:clamp(1.9em,6vw,2.7em);
            color:var(--accent);
            letter-spacing:1px;
            line-height:1;
        }
        .tagline {
            color:var(--text-muted);
            font-size:0.65em;
            letter-spacing:1.8px;
            text-transform:uppercase;
            margin-top:6px;
        }
        .config { display:flex; flex-direction:column; gap:8px; }
        .seg {
            display:flex;
            background:var(--bg-card);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:var(--radius-sm);
            overflow:hidden;
        }
        .seg button {
            flex:1;
            padding:9px 4px;
            background:transparent;
            border:none;
            border-right:1px solid rgba(255,255,255,0.05);
            color:var(--text-muted);
            font-family:'DM Sans',sans-serif;
            font-size:clamp(0.68em,1.9vw,0.78em);
            font-weight:600;
            cursor:pointer;
            transition:all 0.2s;
            text-transform:uppercase;
            letter-spacing:0.4px;
        }
        .seg button:last-child { border-right:none; }
        .seg button.on-gold  { background:var(--accent-dim); color:var(--accent); }
        .seg button.on-green { background:var(--green-dim);  color:var(--green);  }
        .score-row { display:flex; justify-content:center; gap:36px; }
        .sc { text-align:center; }
        .sc-val {
            font-family:'Playfair Display',serif;
            font-size:clamp(1.7em,5vw,2.3em);
            font-weight:700;
            line-height:1;
        }
        .sc-val.g { color:var(--green); }
        .sc-val.r { color:var(--red); }
        .sc-val.a { color:var(--accent); }
        .sc-lbl { font-size:0.6em; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.6px; margin-top:3px; }
        .card {
            background:var(--bg-card);
            border:1px solid rgba(255,255,255,0.05);
            border-radius:var(--radius);
            padding:clamp(24px,5vw,36px) clamp(18px,4vw,30px);
            box-shadow:0 12px 40px rgba(0,0,0,0.6);
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:20px;
        }
        .chord-reveal {
            font-family:'Playfair Display',serif;
            font-size:clamp(3.5em,14vw,6.5em);
            color:var(--accent);
            text-shadow:0 0 40px rgba(201,168,76,0.25);
            letter-spacing:2px;
            min-height:1.1em;
            transition:opacity 0.35s;
            text-align:center;
            line-height:1;
        }
        .chord-reveal.hide { opacity:0; }
        .loading-bar {
            width:100%;
            height:3px;
            background:var(--bg-input);
            border-radius:2px;
            overflow:hidden;
            display:none;
        }
        .loading-fill {
            height:100%;
            background:linear-gradient(90deg,var(--accent),var(--green));
            border-radius:2px;
            transition:width 0.3s;
        }
        .btn-row { width:100%; }
        .btn {
            flex:1;
            padding:13px 10px;
            font-family:'DM Sans',sans-serif;
            font-size:clamp(0.88em,2.5vw,1em);
            font-weight:600;
            border-radius:var(--radius-sm);
            border:1px solid;
            cursor:pointer;
            transition:all 0.25s;
            text-transform:uppercase;
            letter-spacing:0.8px;
        }
        .btn-play {
            background:var(--accent-dim);
            color:var(--accent);
            border-color:var(--accent);
            box-shadow:0 4px 18px rgba(201,168,76,0.2);
        }
        .btn-play:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 24px var(--accent-glow); }
        .btn-play:active:not(:disabled) { transform:translateY(0); }
        .btn-play:disabled { opacity:0.3; cursor:not-allowed; transform:none; }
        .btn-play.siguiente {
            background:var(--green-dim);
            color:var(--green);
            border-color:var(--green);
            box-shadow:0 4px 18px rgba(94,234,212,0.2);
        }
        .btn-play.siguiente:hover:not(:disabled) { box-shadow:0 6px 24px rgba(94,234,212,0.4); }
        .opts {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(118px,1fr));
            gap:8px;
            width:100%;
        }
        .opt {
            padding:12px 8px;
            background:var(--bg-input);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:var(--radius-sm);
            color:var(--text-primary);
            font-family:'DM Sans',sans-serif;
            font-size:clamp(0.78em,2.2vw,0.9em);
            font-weight:600;
            cursor:pointer;
            transition:all 0.2s;
            text-align:center;
            line-height:1.4;
        }
        .opt span.sub { font-weight:400; font-size:0.78em; color:var(--text-muted); }
        .opt:hover:not(:disabled) { border-color:var(--accent); transform:translateY(-1px); }
        .opt.correct { background:var(--green-dim); border-color:var(--green); color:var(--green); }
        .opt.wrong   { background:var(--red-dim);   border-color:var(--red);   color:var(--red);   }
        .opt.correct span.sub,.opt.wrong span.sub { color:inherit; opacity:0.8; }
        .opt:disabled { cursor:default; }
        .fb {
            width:100%;
            padding:11px 16px;
            border-radius:var(--radius-sm);
            font-size:0.88em;
            font-weight:500;
            text-align:center;
            display:none;
        }
        .fb.ok  { display:block; background:var(--green-dim); border:1px solid rgba(94,234,212,0.25); color:var(--green); }
        .fb.err { display:block; background:var(--red-dim);   border:1px solid rgba(248,113,113,0.25); color:var(--red);   }
        footer { text-align:center; color:var(--text-muted); font-size:0.58em; letter-spacing:1.2px; text-transform:uppercase; margin-top:6px; }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>Oído Armónico</h1>
        <p class="tagline">R.Raíndo · Cifrado Latino</p>
    </header>

    <div class="config">
        <div class="seg" id="segNivel">
            <button class="on-gold" onclick="setLevel(1,this)">Tríadas</button>
            <button onclick="setLevel(2,this)">Tétradas</button>
            <button onclick="setLevel(3,this)">Tensiones</button>
        </div>
        <div class="seg" id="segModo">
            <button class="on-green" onclick="setMode('harmonic',this)">Armónico</button>
            <button onclick="setMode('melodic',this)">Melódico</button>
        </div>
    </div>

    <div class="score-row">
        <div class="sc"><div class="sc-val g" id="sOk">0</div><div class="sc-lbl">Aciertos</div></div>
        <div class="sc"><div class="sc-val a" id="sPct">—</div><div class="sc-lbl">Efectividad</div></div>
        <div class="sc"><div class="sc-val r" id="sErr">0</div><div class="sc-lbl">Errores</div></div>
    </div>

    <div class="card">
        <div class="chord-reveal hide" id="reveal">—</div>
        <div class="loading-bar" id="loadingBar"><div class="loading-fill" id="loadingFill" style="width:0%"></div></div>

        <div class="btn-row">
            <button class="btn btn-play" id="btnPlay" onclick="onMainBtn()" disabled>Cargando...</button>
        </div>

        <div class="opts" id="opts"></div>
        <div class="fb"   id="fb"></div>
    </div>

    <footer>Entrenamiento auditivo profesional</footer>
</div>

let audioCtx = null;
let buffers  = {};   // key -> AudioBuffer
let loaded   = 0;

function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

async function loadSamples() {
    const bar  = document.getElementById('loadingBar');
    const fill = document.getElementById('loadingFill');
    bar.style.display = 'block';

    const ac = getCtx();
    const total = SAMPLE_KEYS.length;

    for (let i = 0; i < SAMPLE_KEYS.length; i++) {
        const key = SAMPLE_KEYS[i];
        const b64 = SAMPLES_B64[key];
        const binary = atob(b64);
        const bytes  = new Uint8Array(binary.length);
        for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);
        buffers[key] = await ac.decodeAudioData(bytes.buffer.slice(0));
        loaded++;
        fill.style.width = (loaded / total * 100) + '%';
    }

    bar.style.display = 'none';
    const btn = document.getElementById('btnPlay');
    btn.disabled = false;
    btn.textContent = '▶ Play';
}

// Find nearest sample for a given MIDI note
function nearestSample(midi) {
    let best = 0, bestDist = 999;
    for (let i = 0; i < SAMPLE_MIDIS.length; i++) {
        const d = Math.abs(midi - SAMPLE_MIDIS[i]);
        if (d < bestDist) { bestDist = d; best = i; }
    }
    return SAMPLE_KEYS[best];
}

function scheduleNote(midi, startTime, ac, master) {
    const key = nearestSample(midi);
    const buf = buffers[key];
    if (!buf) return;

    const sampleMidi = SAMPLE_MIDIS[SAMPLE_KEYS.indexOf(key)];
    const rate = Math.pow(2, (midi - sampleMidi) / 12);

    const src  = ac.createBufferSource();
    const gain = ac.createGain();
    src.buffer = buf;
    src.playbackRate.value = rate;
    src.connect(gain);
    gain.connect(master);

    // Envelope
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.38, startTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 2.8);

    src.start(startTime);
    src.stop(startTime + 3.0);
}

function playChord(intervals, baseMidi) {
    const ac  = getCtx();
    ac.resume();
    const master = ac.createGain();
    master.gain.value = 0.82;
    master.connect(ac.destination);
    const now = ac.currentTime + 0.05;

    if (mode === 'harmonic') {
        intervals.forEach(iv => scheduleNote(baseMidi + iv, now, ac, master));
    } else {
        intervals.forEach((iv, i) => {
            // each note played after the previous, small overlap for legato feel
            scheduleNote(baseMidi + iv, now + i * 0.28, ac, master);
        });
    }
}

// ── STATE ────────────────────────────────────────────────
let level = 1, mode = 'harmonic';
let cur = null, rMidi = 0, rName = '', answered = false;
let ok = 0, total = 0;

// C4 = MIDI 60, we play chords from C3 to B4 range (MIDI 48-59 root)
const BASE_MIDI = 48; // C3

// ── CONTROLS ─────────────────────────────────────────────
function setLevel(lv, btn) {
    level = lv;
    document.querySelectorAll('#segNivel button').forEach(b => b.className = '');
    btn.className = 'on-gold';
    clearRound();
}
function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('#segModo button').forEach(b => b.className = '');
    btn.className = 'on-green';
}

// ── GAME ─────────────────────────────────────────────────
function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Single button: plays chord when waiting, goes next after answer
function onMainBtn() {
    if (!answered && cur) {
        // Already in a round — just replay
        playChord(cur.v, rMidi);
    } else {
        // Start new round
        newRound();
    }
}

function newRound() {
    clearRound();
    const pool = CHORDS[level];
    cur   = rnd(pool);
    rMidi = BASE_MIDI + Math.floor(Math.random() * 12);
    rName = ROOTS[rMidi - BASE_MIDI];
    answered = false;

    playChord(cur.v, rMidi);

    const btn = document.getElementById('btnPlay');
    btn.textContent = '▶ Play';
    btn.classList.remove('siguiente');

    // 6 options
    const dist = pool.filter(c => c.n !== cur.n)
                     .sort(() => Math.random() - .5)
                     .slice(0, 5);
    const opts = [...dist, cur].sort(() => Math.random() - .5);

    const grid = document.getElementById('opts');
    opts.forEach(ch => {
        const b = document.createElement('button');
        b.className = 'opt';
        b.innerHTML = `${rName}${ch.s}<br><span class="sub">${ch.n}</span>`;
        b.onclick = () => answer(ch, b);
        grid.appendChild(b);
    });
}

function answer(chosen, btn) {
    if (answered) return;
    answered = true;
    total++;
    const win = chosen.n === cur.n;
    if (win) ok++;

    // Reveal chord name
    document.getElementById('reveal').textContent = rName + cur.s;
    document.getElementById('reveal').classList.remove('hide');

    // Lock all options — no second chance
    const correctLabel = rName + cur.s;
    document.querySelectorAll('.opt').forEach(b => {
        b.disabled = true;
        if (b.childNodes[0].textContent.trim() === correctLabel) b.classList.add('correct');
    });
    if (!win) btn.classList.add('wrong');

    // Feedback
    const fb = document.getElementById('fb');
    fb.textContent = win
        ? '✓ ' + rnd(['¡Excelente!','¡Correcto!','¡Buen oído!','¡Perfecto!','¡Oído fino!'])
        : '✗ Era ' + rName + cur.s + ' · ' + cur.n;
    fb.className = 'fb ' + (win ? 'ok' : 'err');

    // Stats
    document.getElementById('sOk').textContent  = ok;
    document.getElementById('sErr').textContent = total - ok;
    document.getElementById('sPct').textContent = Math.round(ok / total * 100) + '%';

    // Switch button to "Siguiente"
    const mainBtn = document.getElementById('btnPlay');
    mainBtn.textContent = '→ Siguiente';
    mainBtn.classList.add('siguiente');
}

function clearRound() {
    document.getElementById('opts').innerHTML = '';
    document.getElementById('fb').className   = 'fb';
    document.getElementById('reveal').classList.add('hide');
    answered = false;
    cur = null;
}

// ── INIT ──────────────────────────────────────────────────
loadSamples();
</script>
