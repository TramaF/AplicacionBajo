<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dictado Musical</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f1117;
            --bg-card: #181b24;
            --bg-card-hover: #1e2230;
            --bg-input: #141720;
            --accent: #c9a84c;
            --accent-dim: rgba(201, 168, 76, 0.15);
            --accent-glow: rgba(201, 168, 76, 0.35);
            --text-primary: #ecedf0;
            --text-secondary: #7a7f8e;
            --text-muted: #4f5462;
            --green: #5eead4;
            --green-dim: rgba(94, 234, 212, 0.12);
            --red: #fb7185;
            --red-dim: rgba(251, 113, 133, 0.12);
            --blue: #60a5fa;
            --blue-dim: rgba(96, 165, 250, 0.12);
            --radius: 14px;
            --radius-sm: 10px;
            --radius-lg: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Subtle ambient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201, 168, 76, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 20% 100%, rgba(94, 234, 212, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 28px 18px 24px;
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .header h1 .icon {
            display: inline-block;
            margin-right: 8px;
            font-style: normal;
        }

        .header p {
            font-size: 13px;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        /* ── Cards ── */
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-lg);
            padding: 28px 22px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }

        /* ── Welcome Screen ── */
        .welcome-screen {
            text-align: center;
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }

        .welcome-screen .welcome-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 1px solid rgba(201,168,76,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            font-size: 30px;
        }

        .welcome-screen h2 {
            font-family: 'Playfair Display', serif;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: 600;
        }

        .welcome-screen .desc {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 28px;
            font-weight: 300;
        }

        /* ── Game Area ── */
        .game-area {
            animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
        }

        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .score-bar .round-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .score-bar .round-label span {
            color: var(--accent);
            font-weight: 600;
        }

        .progress-track {
            flex: 1;
            margin: 0 16px;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .score-bar .correct-count {
            font-size: 13px;
            font-weight: 500;
            color: var(--green);
            letter-spacing: 0.5px;
        }

        /* Status message */
        .status {
            text-align: center;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 18px;
            min-height: 20px;
            letter-spacing: 0.3px;
        }

        /* ── Slot Area ── */
        .selection-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 22px;
        }

        .note-slot {
            width: 82px;
            height: 56px;
            background: var(--bg-input);
            border: 1px dashed var(--text-muted);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
            position: relative;
        }

        .note-slot .slot-index {
            position: absolute;
            top: 6px;
            left: 10px;
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.6;
        }

        .note-slot.filled {
            background: var(--accent-dim);
            border: 1px solid rgba(201,168,76,0.35);
            color: var(--accent);
            animation: slotPop 0.25s cubic-bezier(0.22,1,0.36,1);
        }

        .note-slot.given {
            background: var(--blue-dim);
            border: 1px solid rgba(96,165,250,0.3);
            color: var(--blue);
        }

        .note-slot.correct-slot {
            background: var(--green-dim);
            border-color: rgba(94,234,212,0.4);
            color: var(--green);
        }

        .note-slot.wrong-slot {
            background: var(--red-dim);
            border-color: rgba(251,113,133,0.4);
            color: var(--red);
        }

        /* ── Controls ── */
        .controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 18px;
        }

        .btn {
            padding: 11px 20px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
            color: var(--text-primary);
            background: var(--bg-card-hover);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }

        .btn:hover::after {
            background: rgba(255,255,255,0.04);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn span { position: relative; z-index: 1; }

        .btn-repeat { border-color: rgba(94,234,212,0.2); }
        .btn-repeat:hover { border-color: rgba(94,234,212,0.4); box-shadow: 0 0 12px rgba(94,234,212,0.12); }

        .btn-check { border-color: rgba(96,165,250,0.2); }
        .btn-check:hover:not(:disabled) { border-color: rgba(96,165,250,0.4); box-shadow: 0 0 12px rgba(96,165,250,0.12); }

        .btn-clear { border-color: rgba(251,113,133,0.2); }
        .btn-clear:hover { border-color: rgba(251,113,133,0.4); box-shadow: 0 0 12px rgba(251,113,133,0.12); }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn:disabled:hover::after { background: transparent; }
        .btn:disabled:hover { box-shadow: none; border-color: rgba(255,255,255,0.07); }

        /* ── Result Box ── */
        .result {
            border-radius: var(--radius);
            padding: 18px 16px;
            text-align: center;
            font-size: 14px;
            font-weight: 400;
            margin-top: 4px;
            animation: fadeUp 0.3s cubic-bezier(0.22,1,0.36,1) both;
        }

        .result .result-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .result .result-interval {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 14px;
            letter-spacing: 0.3px;
        }

        .result.correct {
            background: var(--green-dim);
            border: 1px solid rgba(94,234,212,0.2);
        }
        .result.correct .result-title { color: var(--green); }

        .result.incorrect {
            background: var(--red-dim);
            border: 1px solid rgba(251,113,133,0.2);
        }
        .result.incorrect .result-title { color: var(--red); }
        .result.incorrect .answer-reveal { color: var(--text-secondary); font-size: 13px; margin-bottom: 4px; }
        .result.incorrect .answer-reveal strong { color: var(--text-primary); }

        .btn-next {
            background: var(--accent-dim);
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--accent);
            padding: 9px 24px;
            font-size: 13px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            margin-top: 2px;
        }
        .btn-next:hover { background: rgba(201,168,76,0.22); border-color: rgba(201,168,76,0.45); }
        .btn-next:active { transform: translateY(1px); }

        /* ── Keyboard ── */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .note-btn {
            padding: 16px 6px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.18s cubic-bezier(0.22,1,0.36,1);
            background: var(--bg-card);
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }

        .note-btn::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .note-btn:hover {
            border-color: rgba(201,168,76,0.3);
            background: var(--bg-card-hover);
        }
        .note-btn:hover::before { opacity: 1; }

        .note-btn:active {
            transform: translateY(1px);
            box-shadow: 0 0 10px var(--accent-glow);
            border-color: rgba(201,168,76,0.5);
        }

        .note-btn .key-label {
            display: block;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.8px;
            margin-top: 3px;
            font-weight: 400;
        }

        /* ── Final Score ── */
        .final-score {
            text-align: center;
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }

        .final-score .final-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 1px solid rgba(201,168,76,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 34px;
        }

        .final-score h2 {
            font-family: 'Playfair Display', serif;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 22px;
            font-weight: 600;
        }

        .final-score .score-display {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            font-weight: 700;
            color: var(--accent);
            margin: 16px 0 6px;
            line-height: 1;
        }

        .final-score .score-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .btn-restart {
            background: var(--accent-dim);
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--accent);
            padding: 12px 32px;
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            letter-spacing: 0.4px;
        }
        .btn-restart:hover { background: rgba(201,168,76,0.22); border-color: rgba(201,168,76,0.45); box-shadow: 0 0 16px var(--accent-glow); }
        .btn-restart:active { transform: translateY(1px); }

        /* ── Start Button ── */
        .btn-start {
            background: linear-gradient(135deg, rgba(201,168,76,0.22), rgba(201,168,76,0.12));
            border: 1px solid rgba(201,168,76,0.35);
            color: var(--accent);
            padding: 13px 36px;
            font-size: 15px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
            letter-spacing: 0.5px;
        }
        .btn-start:hover {
            background: linear-gradient(135deg, rgba(201,168,76,0.28), rgba(201,168,76,0.18));
            border-color: rgba(201,168,76,0.5);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-start:active { transform: translateY(1px); }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes slotPop {
            0%   { transform: scale(0.92); }
            60%  { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .shake { animation: shake 0.4s ease; }

        /* ── Utilities ── */
        .hidden { display: none !important; }

        /* ── Responsive ── */
        @media (max-width: 380px) {
            .container { padding: 20px 14px 18px; }
            .note-slot { width: 72px; height: 50px; font-size: 14px; }
            .note-btn { padding: 13px 4px; font-size: 13px; }
            .btn { padding: 10px 16px; font-size: 12px; }
            .header h1 { font-size: 22px; }
        }

        @media (max-height: 680px) {
            .container { padding: 16px 16px 14px; }
            .header { margin-bottom: 18px; }
            .card { padding: 18px 18px; }
            .selection-area { margin-bottom: 16px; }
            .note-btn { padding: 12px 4px; }
            .controls { margin-bottom: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <h1><span class="icon">♪</span>Dictado Musical</h1>
            <p>por R. Raíndo</p>
        </div>

        <!-- Welcome -->
        <div id="welcomeScreen" class="card welcome-screen">
            <div class="welcome-icon">🎵</div>
            <h2>Dictado de 3 Notas</h2>
            <p class="desc">Escucha la secuencia y adivina las notas.<br>10 rondas para poner a prueba tu oído.</p>
            <button class="btn-start" onclick="startGame()">Comenzar</button>
        </div>

        <!-- Game -->
        <div id="gameArea" class="card game-area hidden">
            <div class="score-bar">
                <span class="round-label">Ronda <span id="roundNum">1</span></span>
                <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
                <span class="correct-count" id="correctCount">0 ✓</span>
            </div>

            <div class="status" id="status">Escucha las tres notas</div>

            <div class="selection-area">
                <div class="note-slot given" id="slot1"><span class="slot-index">1ª</span>?</div>
                <div class="note-slot" id="slot2"><span class="slot-index">2ª</span>?</div>
                <div class="note-slot" id="slot3"><span class="slot-index">3ª</span>?</div>
            </div>

            <div class="controls">
                <button class="btn btn-repeat" id="repeatBtn"><span>🔊 Repetir</span></button>
                <button class="btn btn-check" id="checkBtn" disabled><span>✓ Comprobar</span></button>
                <button class="btn btn-clear" id="clearBtn"><span>✕ Borrar</span></button>
            </div>

            <div id="result" class="hidden"></div>
        </div>

        <!-- Final Score -->
        <div id="finalScore" class="card final-score hidden">
            <div class="final-icon">🏆</div>
            <h2>Ronda Completada</h2>
            <div class="score-display" id="finalScoreDisplay">0/10</div>
            <p class="score-label">aciertos de 10 dictados</p>
            <button class="btn-restart" onclick="resetGame()">Jugar de nuevo</button>
        </div>

        <!-- Keyboard -->
        <div id="keyboard" class="keyboard hidden">
            <button class="note-btn" data-note="C">DO<span class="key-label">C4</span></button>
            <button class="note-btn" data-note="D">RE<span class="key-label">D4</span></button>
            <button class="note-btn" data-note="E">MI<span class="key-label">E4</span></button>
            <button class="note-btn" data-note="F">FA<span class="key-label">F4</span></button>
            <button class="note-btn" data-note="G">SOL<span class="key-label">G4</span></button>
            <button class="note-btn" data-note="A">LA<span class="key-label">A4</span></button>
            <button class="note-btn" data-note="B">SI<span class="key-label">B4</span></button>
            <button class="note-btn" data-note="C5">DO<span class="key-label">C5</span></button>
        </div>
    </div>

        const intervalNames = {

        const sampleBuffers = {};

        async function loadSamples() {
            for (const [key, b64] of Object.entries(sampleB64)) {
                const binary = atob(b64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                const buffer = await audioContext.decodeAudioData(bytes.buffer);
                sampleBuffers[key] = buffer;
            }
        }

        loadSamples();

        // Frequencies for pitch calculation
        const noteFrequencies = {
            'C': 261.63, 'D': 293.66, 'E': 329.63, 'F': 349.23,
            'G': 392.00, 'A': 440.00, 'B': 493.88, 'C5': 523.25
        };

        function playNote(frequency, duration = 0.8) {
            // Choose closest sample (C4=261.63 or C5=523.25)
            const useC5 = frequency > 400;
            const sampleKey = useC5 ? 'C5' : 'C4';
            const sampleFreq = useC5 ? 523.25 : 261.63;
            const buf = sampleBuffers[sampleKey];
            if (!buf) return;

            const source = audioContext.createBufferSource();
            const gain   = audioContext.createGain();
            source.buffer = buf;
            source.playbackRate.value = frequency / sampleFreq;
            source.connect(gain);
            gain.connect(audioContext.destination);
            gain.gain.setValueAtTime(0.8, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            source.start(audioContext.currentTime);
            source.stop(audioContext.currentTime + duration + 0.1);
        }

        async function playSequence(notes) {
            for (let i = 0; i < notes.length; i++) {
                playNote(noteFrequencies[notes[i]], 0.8);
                await new Promise(r => setTimeout(r, 1000));
            }
        }

        /* ── Game Logic ── */
        function calculateInterval(n1, n2) {
            const scale = ['C','D','E','F','G','A','B','C5'];
            return scale.indexOf(n2) - scale.indexOf(n1);
        }

        function generateRandomNotes() {
            const notes = ['C','D','E','F','G','A','B','C5'];
            const patterns = [
                [0,1,2],[0,2,4],[2,1,0],[4,2,0],[0,2,1],
                [0,-2,0],[0,1,0],[0,0,1],[0,0,-1],[0,2,0],
                [0,1,3],[0,3,1]
            ];
            const pattern  = patterns[Math.floor(Math.random() * patterns.length)];
            const maxI     = Math.max(...pattern);
            const minI     = Math.min(...pattern);
            const startIdx = Math.floor(Math.random() * (8 - maxI)) + Math.abs(minI);
            return pattern.map(p => notes[Math.max(0, Math.min(7, startIdx + p))]);
        }

        function startGame() {
            welcomeScreen.classList.add('hidden');
            gameArea.classList.remove('hidden');
            keyboard.classList.remove('hidden');
            currentRound    = 0;
            correctAnswers  = 0;
            startNewRound();
        }

        function startNewRound() {
            if (currentRound >= totalRounds) { showFinalScore(); return; }

            currentRound++;
            targetNotes   = generateRandomNotes();
            userSelection = [];
            gameActive    = true;

            /* UI update */
            roundNum.textContent     = currentRound;
            progressFill.style.width = ((currentRound - 1) / totalRounds * 100) + '%';
            correctCount.textContent = correctAnswers + ' ✓';

            slots.forEach((slot, i) => {
                /* reset classes */
                slot.classList.remove('filled','correct-slot','wrong-slot');
                if (i === 0) {
                    slot.classList.add('given');
                    slot.childNodes[slot.childNodes.length - 1].textContent = noteNames[targetNotes[0]];
                    userSelection.push(targetNotes[0]);
                } else {
                    slot.classList.remove('given');
                    slot.childNodes[slot.childNodes.length - 1].textContent = '?';
                }
            });

            resultDiv.classList.add('hidden');
            resultDiv.className = 'hidden';
            status.textContent  = 'Escucha las tres notas';
            checkBtn.disabled   = true;

            playSequence(targetNotes);
        }

        function updateSlots() {
            slots.forEach((slot, i) => {
                slot.classList.remove('filled','correct-slot','wrong-slot');
                if (userSelection[i]) {
                    if (i === 0) slot.classList.add('given');
                    else         slot.classList.add('filled');
                    slot.childNodes[slot.childNodes.length - 1].textContent = noteNames[userSelection[i]];
                } else {
                    slot.classList.remove('given');
                    slot.childNodes[slot.childNodes.length - 1].textContent = '?';
                }
            });
            checkBtn.disabled = userSelection.length !== 3;
        }

        function addNote(note) {
            if (userSelection.length < 3 && gameActive) {
                userSelection.push(note);
                updateSlots();
                playNote(noteFrequencies[note], 0.5);
            }
        }

        function checkAnswer() {
            if (userSelection.length !== 3) return;

            const correct    = userSelection.every((n, i) => n === targetNotes[i]);
            const interval1  = calculateInterval(targetNotes[0], targetNotes[1]);
            const interval2  = calculateInterval(targetNotes[1], targetNotes[2]);
            const iName1     = intervalNames[interval1];
            const iName2     = intervalNames[interval2];

            /* color slots */
            slots.forEach((slot, i) => {
                slot.classList.remove('filled','given');
                if (i === 0) { slot.classList.add('given'); return; }
                slot.classList.add(userSelection[i] === targetNotes[i] ? 'correct-slot' : 'wrong-slot');
            });

            resultDiv.classList.remove('hidden');

            if (correct) {
                correctAnswers++;
                correctCount.textContent = correctAnswers + ' ✓';
                resultDiv.className = 'result correct';
                resultDiv.innerHTML = `
                    <div class="result-title">¡Correcto!</div>
                    <div class="result-interval">${iName1} → ${iName2}</div>
                    <button class="btn-next" onclick="startNewRound()">Siguiente →</button>`;
                status.textContent = 'Excelente oído musical';
            } else {
                const seq = targetNotes.map(n => noteNames[n]).join(' · ');
                resultDiv.className = 'result incorrect';
                resultDiv.innerHTML = `
                    <div class="result-title">No del todo</div>
                    <div class="answer-reveal">La secuencia era: <strong>${seq}</strong></div>
                    <div class="result-interval">${iName1} → ${iName2}</div>
                    <button class="btn-next" onclick="startNewRound()">Siguiente →</button>`;
                status.textContent = 'Sigue intentándolo';

                /* subtle shake on slots */
                slots.forEach(s => { s.classList.add('shake'); setTimeout(() => s.classList.remove('shake'), 450); });
            }

            gameActive = false;
        }

        function clearSelection() {
            userSelection = [targetNotes[0]];
            updateSlots();
        }

        function showFinalScore() {
            gameArea.classList.add('hidden');
            keyboard.classList.add('hidden');
            finalScoreDiv.classList.remove('hidden');
            progressFill.style.width = '100%';
            document.getElementById('finalScoreDisplay').textContent = correctAnswers + '/10';
        }

        function resetGame() {
            finalScoreDiv.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
        }

        /* ── Events ── */
        keyboard.addEventListener('click', e => {
            const btn = e.target.closest('.note-btn');
            if (btn) addNote(btn.dataset.note);
        });

        repeatBtn.addEventListener('click', () => playSequence(targetNotes));
        checkBtn.addEventListener('click', checkAnswer);
        clearBtn.addEventListener('click', clearSelection);

        document.addEventListener('gesturestart', e => e.preventDefault());
    </script>
