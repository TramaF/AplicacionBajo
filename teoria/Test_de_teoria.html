<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Teoría Musical - R. Raíndo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0f1117;
  --bg-card: #181b24;
  --bg-card-alt: #141720;
  --accent: #c9a84c;
  --accent-dim: rgba(201,168,76,0.13);
  --accent-glow: rgba(201,168,76,0.35);
  --green: #5eead4;
  --green-dim: rgba(94,234,212,0.12);
  --red: #fb7185;
  --red-dim: rgba(251,113,133,0.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.12);
  --text: #e2e4e9;
  --text-muted: #7a7f8e;
  --border: rgba(255,255,255,0.07);
  --font-head: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 0%,  rgba(201,168,76,0.055) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(96,165,250,0.045) 0%, transparent 70%);
}

/* floating musical notes — subtle, dark-friendly */
.musical-notes {
  position: fixed;
  font-size: 1.8rem;
  color: var(--accent);
  opacity: 0.06;
  pointer-events: none;
  z-index: 0;
  user-select: none;
}

/* ── Container ── */
.container {
  width: 95%;
  max-width: 520px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  position: relative;
  z-index: 1;
  margin: 20px;
}

/* ── Header ── */
.header {
  text-align: center;
  margin-bottom: 24px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.header::before {
  content:'';
  position:absolute;
  top: -24px; left: -24px; right: -24px; height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  border-radius: 20px 20px 0 0;
}
.header h1 {
  font-family: var(--font-head);
  color: var(--text);
  font-size: 1.75rem;
  margin-bottom: 6px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.header p {
  color: var(--accent);
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 500;
}

/* ── Welcome / clef ── */
.welcome-screen { text-align: center; }
.welcome-screen h2 {
  font-family: var(--font-head);
  color: var(--text);
  margin-bottom: 24px;
  font-size: 1.45rem;
  font-weight: 600;
}
.clef {
  font-size: 2.6rem;
  text-align: center;
  margin: 8px 0 16px;
  color: var(--accent);
  opacity: 0.45;
}

/* ── Buttons (start / restart) ── */
.start-btn, .restart-btn {
  background: linear-gradient(135deg, #b8943f, var(--accent), #b8943f);
  background-size: 200% 100%;
  background-position: 100% 0;
  color: var(--bg-deep);
  border: none;
  padding: 15px 42px;
  border-radius: 12px;
  font-size: 1rem;
  font-family: var(--font-body);
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 18px var(--accent-glow);
  transition: all 0.3s ease;
  letter-spacing: 0.3px;
}
.start-btn:hover, .restart-btn:hover {
  background-position: 0% 0;
  transform: translateY(-2px);
  box-shadow: 0 6px 24px var(--accent-glow);
}

/* ── Progress bar ── */
.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--bg-card-alt);
  border-radius: 2px;
  margin-bottom: 22px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #dcc07a);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ── Question ── */
.question-container { margin-bottom: 4px; }
.question-number {
  color: var(--text-muted);
  font-weight: 500;
  font-size: 11.5px;
  margin-bottom: 6px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
}
.question-number span { color: var(--accent); font-weight: 600; }
.question-text {
  font-family: var(--font-head);
  font-size: 1.08rem;
  color: var(--text);
  margin-bottom: 20px;
  line-height: 1.55;
  font-weight: 600;
  letter-spacing: -0.15px;
}

/* ── Options ── */
.options { display:flex; flex-direction:column; gap: 10px; }
.option {
  background: var(--bg-card-alt);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  cursor: pointer;
  transition: all 0.22s ease;
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text);
  text-align: left;
  font-weight: 500;
  position: relative;
  overflow: hidden;
  animation: optIn 0.26s ease both;
}
.option:nth-child(1){animation-delay:0.03s}
.option:nth-child(2){animation-delay:0.08s}
.option:nth-child(3){animation-delay:0.13s}
.option:nth-child(4){animation-delay:0.18s}

.option::before {
  content:'';
  position:absolute;
  inset:0;
  background: var(--blue-dim);
  opacity:0;
  transition: opacity 0.22s;
}
.option:hover {
  border-color: var(--blue);
  color: #fff;
}
.option:hover::before { opacity:1; }
.option > * { position:relative; z-index:1; }

/* correct / incorrect */
.option.correct {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
  box-shadow: 0 0 14px rgba(94,234,212,0.22);
  animation: pulse 0.45s ease;
}
.option.correct::before { opacity:0 !important; }

.option.incorrect {
  background: var(--red-dim);
  border-color: var(--red);
  color: var(--red);
  box-shadow: 0 0 14px rgba(251,113,133,0.22);
  animation: shake 0.45s ease;
}
.option.incorrect::before { opacity:0 !important; }

.option:disabled {
  cursor: not-allowed;
  opacity: 0.5;
}
.option.correct:disabled,
.option.incorrect:disabled { opacity:1; }

/* ── Next button ── */
.next-btn {
  width: 100%;
  background: linear-gradient(135deg, #b8943f, var(--accent));
  border: none;
  border-radius: 12px;
  padding: 14px;
  color: var(--bg-deep);
  font-size: 15px;
  font-family: var(--font-body);
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
  transition: all 0.25s ease;
  display: none;
  letter-spacing: 0.3px;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.next-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 22px var(--accent-glow);
}

/* ── Results ── */
.results { text-align:center; display:none; }
.results h2 {
  font-family: var(--font-head);
  color: var(--text);
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.score {
  font-size: 3.2rem;
  color: var(--accent);
  margin: 16px 0;
  font-weight: 600;
  font-family: var(--font-head);
  text-shadow: 0 0 20px var(--accent-glow);
}

/* grade badges */
.grade {
  font-size: 1.25rem;
  margin: 14px auto 22px;
  padding: 12px 32px;
  border-radius: 12px;
  font-weight: 600;
  font-family: var(--font-body);
  display: inline-block;
  letter-spacing: 0.5px;
}
.grade.sobresaliente {
  background: var(--green-dim);
  border: 1px solid var(--green);
  color: var(--green);
  box-shadow: 0 0 18px rgba(94,234,212,0.25);
}
.grade.notable {
  background: var(--blue-dim);
  border: 1px solid var(--blue);
  color: var(--blue);
  box-shadow: 0 0 18px rgba(96,165,250,0.25);
}
.grade.bien {
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  color: var(--accent);
  box-shadow: 0 0 18px var(--accent-glow);
}
.grade.suficiente {
  background: rgba(251,146,60,0.12);
  border: 1px solid rgba(251,146,60,0.4);
  color: #fb923c;
  box-shadow: 0 0 16px rgba(251,146,60,0.2);
}
.grade.insuficiente {
  background: var(--red-dim);
  border: 1px solid var(--red);
  color: var(--red);
  box-shadow: 0 0 18px rgba(251,113,133,0.25);
}

/* ── Keyframes ── */
@keyframes optIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse {
  0%,100% { transform:scale(1); }
  50%     { transform:scale(1.03); }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25%     { transform:translateX(-5px); }
  75%     { transform:translateX(5px); }
}

/* ── Responsive ── */
@media (max-height: 700px) {
  .container { padding: 16px; }
  .header h1 { font-size: 1.4rem; }
  .question-text { font-size: 1rem; }
  .option { padding: 11px 16px; font-size: 13.5px; }
}
</style>
</head>

        // Audio context para generar sonidos

        function playSound(isCorrect) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (isCorrect) {
                // Sonido de acierto: notas ascendentes
                oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // Do
                oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // Mi
                oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // Sol
            } else {
                // Sonido de error: notas descendentes
                oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(300, audioContext.currentTime + 0.1);
                oscillator.frequency.setValueAtTime(200, audioContext.currentTime + 0.2);
            }
            
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);

            {q: "¿Cuántos sostenidos tiene SOL mayor?", o: ["Ninguno", "Uno", "Dos", "Tres"], c: 1},
            {q: "¿Qué tonalidad no tiene alteraciones?", o: ["SOL mayor", "FA mayor", "DO mayor", "RE mayor"], c: 2},
            {q: "¿Qué es la armadura de clave?", o: ["La clave al inicio", "Las alteraciones fijas tras la clave", "El compás", "El tempo"], c: 1},
            {q: "¿Qué es una modulación?", o: ["Cambio de tempo", "Cambio de tonalidad", "Cambio de compás", "Cambio de clave"], c: 1},
            {q: "¿Qué forma tiene estructura ABA?", o: ["Binaria", "Ternaria", "Rondó", "Fuga"], c: 1}
        ];

        let currentQuestion = 0, score = 0, selectedQuestions = [], answerSelected = false;

        function startQuiz() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('quizContainer').style.display = 'block';
            initQuiz();
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function initQuiz() {
            selectedQuestions = shuffleArray(questions).slice(0, 10);
            currentQuestion = 0; 
            score = 0; 
            answerSelected = false;
            document.getElementById('quiz').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            loadQuestion();
        }

        function loadQuestion() {
            const q = selectedQuestions[currentQuestion];
            answerSelected = false;
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('questionNumber').textContent = `Pregunta ${currentQuestion + 1} de 10`;
            document.getElementById('questionText').textContent = q.q;
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => selectAnswer(i);
                opts.appendChild(btn);
            });
            document.getElementById('progressBar').style.width = (currentQuestion / 10) * 100 + '%';
        }

        function selectAnswer(i) {
            if (answerSelected) return;
            answerSelected = true;
            const q = selectedQuestions[currentQuestion];
            const opts = document.querySelectorAll('.option');
            opts.forEach(o => { o.disabled = true; o.style.cursor = 'not-allowed'; });
            
            if (i === q.c) { 
                opts[i].classList.add('correct'); 
                score++;
                playSound(true); // Sonido de acierto
            } else { 
                opts[i].classList.add('incorrect'); 
                opts[q.c].classList.add('correct');
                playSound(false); // Sonido de fallo
            }
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < 10) loadQuestion();
            else showResults();
        }

        function showResults() {
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('scoreDisplay').textContent = score + '/10';
            let grade, gc;
            if (score >= 9) { grade = 'Sobresaliente'; gc = 'sobresaliente'; }
            else if (score >= 7) { grade = 'Notable'; gc = 'notable'; }
            else if (score >= 6) { grade = 'Bien'; gc = 'bien'; }
            else if (score >= 5) { grade = 'Suficiente'; gc = 'suficiente'; }
            else { grade = 'Insuficiente'; gc = 'insuficiente'; }
            const gd = document.getElementById('gradeDisplay');
            gd.textContent = grade; 
            gd.className = 'grade ' + gc;
        }

        function restartQuiz() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('welcomeScreen').style.display = 'block';
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startQuiz);
        document.getElementById('nextBtn').addEventListener('click', nextQuestion);
        document.getElementById('restartBtn').addEventListener('click', restartQuiz);
    </script>
</body>
</html>
